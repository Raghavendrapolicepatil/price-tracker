<!DOCTYPE html>
<!--
  DOCTYPE tells the browser: "This is a modern HTML5 page"
  Always put this at the very top of every HTML file.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- charset="UTF-8" means our page supports all characters including ₹ $ € symbols -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- viewport tag makes the page look good on mobile phones too -->

  <title>PriceWatch — Track Product Prices</title>

  <!-- Google Fonts: We load two fonts from the internet -->
  <!-- "Syne" is used for headings, "DM Mono" for prices/code-like text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/...">
  <!-- Chart.js: A free library that draws beautiful graphs -->
  <!-- We load it from the internet (CDN), no install needed -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* ============================================================
       CSS RESET & ROOT VARIABLES
       Think of CSS variables like "settings" — change once, updates everywhere
    ============================================================ */
    :root {
      --bg:        #0a0a0f;       /* Main background: very dark navy */
      --surface:   #13131a;       /* Card/panel background: slightly lighter */
      --border:    #1e1e2e;       /* Border color for boxes */
      --accent:    #00e5a0;       /* Bright green — our brand highlight color */
      --accent2:   #7c6fff;       /* Purple — secondary accent */
      --text:      #e8e8f0;       /* Main text: off-white */
      --muted:     #5a5a78;       /* Dim text for labels/hints */
      --danger:    #ff4f6a;       /* Red for errors */
      --font-head: 'Syne', sans-serif;       /* Font for headings */
      --font-mono: 'DM Mono', monospace;     /* Font for prices, URLs */
    }

    /* Box-sizing: border-box means padding doesn't ADD to width.
       e.g. a 300px box with 20px padding stays 300px total.
       This makes layout much easier to manage. */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-head);
      min-height: 100vh;      /* vh = viewport height. 100vh = full screen height */
      overflow-x: hidden;     /* prevent horizontal scroll */
    }

    /* ============================================================
       ANIMATED BACKGROUND GRID
       This creates the faint grid lines you see in the background.
       It's purely decorative — uses CSS gradients.
    ============================================================ */
    body::before {
      content: '';            /* ::before is a fake element we can style */
      position: fixed;        /* fixed = stays in place even when you scroll */
      inset: 0;               /* inset: 0 = top/right/bottom/left all = 0 (fills screen) */
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;   /* each grid square is 40x40 pixels */
      opacity: 0.4;
      z-index: -1;            /* z-index: -1 sends it BEHIND all content */
    }

    /* ============================================================
       HEADER
    ============================================================ */
    header {
      padding: 2rem 2rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;            /* flexbox: puts children side-by-side */
      align-items: center;
      gap: 1rem;
    }

    .logo-dot {
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;       /* 50% = circle */
      /* animation: pulse 2s infinite — makes the dot "breathe" */
      animation: pulse 2s ease-in-out infinite;
    }

    /* Keyframes define what happens at each step of an animation */
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.03em;   /* slightly tighter spacing for headings */
    }

    header h1 span { color: var(--accent); }

    .badge {
      margin-left: auto;         /* auto margin pushes this to the right edge */
      background: var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      padding: 0.3rem 0.75rem;
      border-radius: 100px;      /* pill shape */
      border: 1px solid var(--border);
    }

    /* ============================================================
       MAIN LAYOUT — two columns on wide screens, one column on mobile
    ============================================================ */
    main {
      max-width: 1100px;         /* page won't be wider than 1100px */
      margin: 0 auto;            /* center horizontally */
      padding: 2.5rem 2rem;
      display: grid;
      /* Two columns: left = 1fr (flexible), right = 380px (fixed) */
      grid-template-columns: 1fr 380px;
      gap: 2rem;
    }

    /* On screens narrower than 800px, switch to single column */
    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; }
    }

    /* ============================================================
       CARD COMPONENT — reusable box style
    ============================================================ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
    }

    .card-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;   /* makes text ALL CAPS */
      letter-spacing: 0.12em;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* The little line after the label text */
    .card-label::after {
      content: '';
      flex: 1;                   /* takes remaining width */
      height: 1px;
      background: var(--border);
    }

    /* ============================================================
       TRACKER FORM — URL input + button
    ============================================================ */
    .tracker-hero h2 {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.04em;
      margin-bottom: 0.5rem;
    }

    .tracker-hero h2 em {
      font-style: normal;
      color: var(--accent);
    }

    .tracker-hero p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
      line-height: 1.6;
    }

    /* The URL input field container */
    .input-group {
      display: flex;
      gap: 0;                    /* no gap — they'll sit flush together */
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;          /* clip children to rounded corners */
      transition: border-color 0.2s;
    }

    /* When the input is focused (user clicked on it), highlight the border */
    .input-group:focus-within { border-color: var(--accent); }

    #urlInput {
      flex: 1;                   /* takes all available width */
      background: transparent;
      border: none;
      outline: none;             /* remove default browser focus ring */
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.9rem 1rem;
    }

    #urlInput::placeholder { color: var(--muted); }

    #trackBtn {
      background: var(--accent);
      color: #000;               /* black text on green background */
      border: none;
      padding: 0.9rem 1.5rem;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;           /* shows hand cursor on hover */
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;       /* prevent text from wrapping */
    }

    /* Hover state: slightly dim and scale down */
    #trackBtn:hover  { opacity: 0.85; }
    #trackBtn:active { transform: scale(0.97); }

    /* While loading: dim and not clickable */
    #trackBtn.loading { opacity: 0.6; pointer-events: none; cursor: not-allowed; }

    /* ============================================================
       RESULT CARD — shows after fetching price
    ============================================================ */
    #resultCard {
      margin-top: 1.5rem;
      display: none;   /* hidden by default — JS shows it when price is fetched */
    }

    .result-site {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* A small colored dot to indicate Amazon or Flipkart */
    .site-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent2);
    }

    .result-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      line-height: 1.4;
      color: var(--text);
    }

    /* The big price number */
    .price-display {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .price-amount {
      font-family: var(--font-mono);
      font-size: 2.8rem;
      font-weight: 500;
      color: var(--accent);
      /* Text shadow creates a subtle glow effect */
      text-shadow: 0 0 30px rgba(0, 229, 160, 0.35);
      line-height: 1;
    }

    .price-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* The small timestamp below the price */
    .price-time {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    /* ============================================================
       ERROR / SUCCESS MESSAGES
    ============================================================ */
    #message {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      display: none;   /* hidden by default */
    }

    #message.error {
      background: rgba(255, 79, 106, 0.1);
      border: 1px solid rgba(255, 79, 106, 0.3);
      color: var(--danger);
      display: block;
    }

    #message.success {
      background: rgba(0, 229, 160, 0.1);
      border: 1px solid rgba(0, 229, 160, 0.3);
      color: var(--accent);
      display: block;
    }

    /* ============================================================
       HISTORY SIDEBAR — right column
    ============================================================ */
    .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }

    .history-list { display: flex; flex-direction: column; gap: 0.75rem; }

    /* Each row in the history list */
    .history-item {
      display: flex;
      justify-content: space-between;  /* pushes price to the right */
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color 0.2s;
    }

    .history-item:hover { border-color: var(--accent2); }

    .history-name {
      font-size: 0.78rem;
      color: var(--text);
      font-weight: 600;
      /* If text is too long, cut it off with "..." */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 170px;
    }

    .history-meta {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .history-price {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--accent);
      white-space: nowrap;
    }

    /* ============================================================
       CHART SECTION — price history graph
    ============================================================ */
    #chartSection {
      grid-column: 1 / -1;   /* span ALL columns (both left and right) */
      display: none;          /* hidden until we have data */
    }

    .chart-wrapper {
      position: relative;
      height: 280px;
    }

    /* Empty state shown when no tracked products yet */
    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .empty-state span {
      display: block;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    /* Spinning animation for the loading indicator */
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>

<body>

  <!-- ============================================================
       HEADER
  ============================================================ -->
  <header>
    <div class="logo-dot"></div>
    <!-- The pulsing green dot beside the logo -->

    <h1>Price<span>Watch</span></h1>

    <div class="badge">Amazon · Flipkart</div>
    <!-- Small pill badge on the right side -->
  </header>

  <!-- ============================================================
       MAIN CONTENT — two-column grid
  ============================================================ -->
  <main>

    <!-- ── LEFT COLUMN: Tracker Form + Result ── -->
    <div class="left-col">

      <div class="tracker-hero">
        <h2>Track <em>any</em> product<br>price instantly.</h2>
        <p>Paste an Amazon or Flipkart product URL below.<br>
           We'll fetch the current price and save it to your history.</p>

        <!-- URL Input + Button -->
        <div class="input-group">
          <input
            type="url"
            id="urlInput"
            placeholder="https://www.amazon.in/dp/... or flipkart.com/..."
          />
          <!--
            type="url" tells the browser this should be a URL.
            id="urlInput" lets JavaScript find this element with getElementById()
          -->

          <button id="trackBtn" onclick="trackPrice()">
            Track Price →
          </button>
          <!--
            onclick="trackPrice()" — when clicked, run the trackPrice() function
            That function is defined in the <script> section below
          -->
        </div>

        <!-- Message box: shows errors or success messages -->
        <div id="message"></div>
        <!--
          This div is hidden (display:none) until JavaScript adds
          the class "error" or "success" to show it
        -->
      </div>

      <!-- Result Card: hidden at first, shown when price is fetched -->
      <div class="card" id="resultCard">
        <div class="card-label">Latest Fetch</div>

        <div class="result-site">
          <div class="site-dot"></div>
          <span id="resultSite">—</span>
          <!-- id="resultSite" — JS will update this text to "Amazon" or "Flipkart" -->
        </div>

        <div class="result-title" id="resultTitle">—</div>
        <!-- JS will put the product name here -->

        <div class="price-display">
          <div class="price-amount" id="resultPrice">—</div>
          <!-- JS will put "₹1,299" or "$49.99" here -->

          <div class="price-label">current price</div>
        </div>

        <div class="price-time" id="resultTime">—</div>
        <!-- JS will put "Fetched at 3:45 PM" here -->
      </div>

    </div> <!-- end left-col -->


    <!-- ── RIGHT COLUMN: History Sidebar ── -->
    <div class="sidebar">

      <div class="card">
        <div class="card-label">Recent Tracks</div>
        <div class="history-list" id="historyList">
          <!-- History items are added here by JavaScript -->
          <div class="empty-state">
            <span>📦</span>
            Track your first product to see history here.
          </div>
        </div>
      </div>

    </div> <!-- end sidebar -->


    <!-- ── FULL-WIDTH ROW: Price History Chart ── -->
    <div id="chartSection">
      <div class="card">
        <div class="card-label">Price History Graph</div>
        <div class="chart-wrapper">
          <!-- canvas is the HTML element that Chart.js draws on -->
          <canvas id="priceChart"></canvas>
        </div>
      </div>
    </div>

  </main>


  <!-- ============================================================
       JAVASCRIPT — The "brain" of our frontend

       JavaScript runs in the browser. It:
       1. Reads what the user typed
       2. Sends it to our backend (Node.js server)
       3. Shows the result on the page

       HOW FRONTEND TALKS TO BACKEND:
       - We use fetch() — a built-in browser function
       - fetch() sends an HTTP request to our server (like clicking a link, but invisible)
       - The server processes it and sends back JSON data
       - JSON looks like: { "price": "₹1,299", "title": "Phone XYZ" }
       - We then display that data on the page
  ============================================================ -->
  <script>

    // ─────────────────────────────────────────────
    // CONFIGURATION
    // Change this if your server runs on a different port
    // ─────────────────────────────────────────────
    const SERVER_URL = 'https://price-tracker-backend-pkdy.onrender.com';
    // This is the address of our Node.js backend server
    // localhost = "this computer"
    // 3000 = the port number (like a door number in an apartment building)


    // ─────────────────────────────────────────────
    // CHART SETUP
    // We create the Chart.js chart object once, then update it with data
    // ─────────────────────────────────────────────
    let priceChart = null;  // null means "no chart yet"

    function initChart(labels, prices) {
      // labels = array of dates, e.g. ["Dec 1", "Dec 2", "Dec 3"]
      // prices = array of numbers, e.g. [1299, 1249, 1199]

      const ctx = document.getElementById('priceChart').getContext('2d');
      // getContext('2d') gives us the drawing tools for the canvas

      // If a chart already exists, destroy it before making a new one
      // (otherwise Chart.js shows an error)
      if (priceChart) priceChart.destroy();

      priceChart = new Chart(ctx, {
        type: 'line',   // line chart (other options: 'bar', 'pie', 'doughnut')
        data: {
          labels: labels,    // x-axis labels (dates)
          datasets: [{
            label: 'Price (₹)',
            data: prices,    // y-axis values (prices)
            borderColor: '#00e5a0',           // line color: our accent green
            backgroundColor: 'rgba(0,229,160,0.08)',  // faint fill under the line
            borderWidth: 2,
            pointBackgroundColor: '#00e5a0',  // dot color at each data point
            pointRadius: 4,
            tension: 0.4,    // 0 = sharp corners, 1 = very curvy line
            fill: true       // fill the area under the line
          }]
        },
        options: {
          responsive: true,    // chart resizes when window is resized
          maintainAspectRatio: false,  // lets us control the height manually
          plugins: {
            legend: { display: false }   // hide the legend (label box)
          },
          scales: {
            x: {
              // Style the x-axis (dates)
              ticks: { color: '#5a5a78', font: { family: 'DM Mono', size: 11 } },
              grid:  { color: '#1e1e2e' }
            },
            y: {
              // Style the y-axis (prices)
              ticks: { color: '#5a5a78', font: { family: 'DM Mono', size: 11 } },
              grid:  { color: '#1e1e2e' }
            }
          }
        }
      });
    }


    // ─────────────────────────────────────────────
    // HELPER: Show a message to the user
    // type = "error" or "success"
    // ─────────────────────────────────────────────
    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;           // set the message text
      el.className = type;             // add class "error" or "success" (controls color)
    }

    function hideMessage() {
      const el = document.getElementById('message');
      el.className = '';               // removing class hides the message (display:none in CSS)
    }


    // ─────────────────────────────────────────────
    // HELPER: Detect if URL is Amazon or Flipkart
    // ─────────────────────────────────────────────
    function detectSite(url) {
      if (url.includes('amazon'))   return 'Amazon';
      if (url.includes('flipkart')) return 'Flipkart';
      return 'Unknown';
    }


    // ─────────────────────────────────────────────
    // MAIN FUNCTION: Called when user clicks "Track Price"
    // ─────────────────────────────────────────────
    async function trackPrice() {
      // async means this function can "wait" for network requests
      // without freezing the browser

      // 1. Get what the user typed in the input box
      const url = document.getElementById('urlInput').value.trim();
      // .value gets the text, .trim() removes spaces from start/end

      // 2. Basic validation — don't send empty request
      if (!url) {
        showMessage('⚠ Please paste a product URL first.', 'error');
        return;  // stop here, don't continue
      }

      // 3. Check if it's Amazon or Flipkart
      if (!url.includes('amazon') && !url.includes('flipkart')) {
        showMessage('⚠ Please use an Amazon or Flipkart URL.', 'error');
        return;
      }

      // 4. Show loading state on the button
      const btn = document.getElementById('trackBtn');
      btn.innerHTML = '<span class="spinner"></span>Fetching...';
      btn.classList.add('loading');
      hideMessage();

      try {
        // ─────────────────────────────────────────────
        // HOW WE TALK TO THE BACKEND:
        //
        // fetch() sends an HTTP POST request to our server.
        //
        // It's like filling out a form and clicking submit,
        // except it happens invisibly in the background.
        //
        // We send: { "url": "https://amazon.in/dp/..." }
        // We receive: { "price": "₹1,299", "title": "...", "site": "Amazon" }
        // ─────────────────────────────────────────────

        const response = await fetch(`${SERVER_URL}/track`, {
          // await means "wait until this is done before continuing"

          method: 'POST',          // POST = we're sending data to the server
          headers: {
            'Content-Type': 'application/json'
            // Tell the server: "I'm sending JSON format data"
          },
          body: JSON.stringify({ url: url })
          // JSON.stringify converts a JavaScript object to a JSON string
          // { url: url } becomes '{"url":"https://amazon.in/..."}'
        });

        // 5. Parse the response from server
        const data = await response.json();
        // response.json() converts the server's text response back to a JS object

        // 6. If server returned an error
        if (!response.ok || data.error) {
          showMessage(`✗ ${data.error || 'Failed to fetch price. Try again.'}`, 'error');
          return;
        }

        // ─────────────────────────────────────────────
        // 7. SUCCESS! Show the result on the page
        // ─────────────────────────────────────────────

        // Update the result card fields
        document.getElementById('resultSite').textContent  = data.site;
        document.getElementById('resultTitle').textContent = data.title || 'Product';
        document.getElementById('resultPrice').textContent = data.price;
        document.getElementById('resultTime').textContent  =
          `Fetched at ${new Date().toLocaleTimeString()}`;

        // Show the result card (it was hidden with display:none)
        document.getElementById('resultCard').style.display = 'block';

        showMessage('✓ Price fetched and saved!', 'success');

        // 8. Reload the history list and chart
        loadHistory();

      } catch (err) {
        // This catch block runs if fetch() itself failed
        // (e.g., server is not running, no internet connection)
        console.error('Fetch error:', err);   // log to browser console for debugging
        showMessage('✗ Cannot connect to server. Is it running on port 3000?', 'error');
      } finally {
        // finally block ALWAYS runs, whether success or error
        // Reset the button back to normal
        btn.innerHTML = 'Track Price →';
        btn.classList.remove('loading');
      }
    }


    // ─────────────────────────────────────────────
    // LOAD HISTORY from the database
    // This fetches saved prices from our backend
    // ─────────────────────────────────────────────
    async function loadHistory() {
      try {
        // Send GET request — we're just asking for data, not sending any
        const response = await fetch(`${SERVER_URL}/history`);
        const data = await response.json();

        if (!data.history || data.history.length === 0) return;

        // ── Update the sidebar history list ──
        const list = document.getElementById('historyList');
        list.innerHTML = '';  // clear existing items

        data.history.forEach(item => {
          // forEach loops through each saved price record
          const div = document.createElement('div');  // create a new <div>
          div.className = 'history-item';

          // Format the date to be readable
          const date = new Date(item.fetched_at).toLocaleDateString();

          div.innerHTML = `
            <div>
              <div class="history-name">${escapeHtml(item.title || 'Product')}</div>
              <div class="history-meta">${escapeHtml(item.site)} · ${date}</div>
            </div>
            <div class="history-price">${escapeHtml(item.price)}</div>
          `;
          list.appendChild(div);  // add the new div to the page
        });

        // ── Update the price history chart ──
        // We take the last 15 entries and show them on the graph
        const chartData = data.history.slice(0, 15).reverse();
        // .reverse() so oldest is on the left, newest on the right

        const labels = chartData.map(item =>
          new Date(item.fetched_at).toLocaleDateString('en-IN', { month: 'short', day: 'numeric' })
        );
        // .map() transforms each item into just the date label

        const prices = chartData.map(item => {
          // Extract just the number from strings like "₹1,299" or "$49.99"
          const num = parseFloat(item.price.replace(/[^0-9.]/g, ''));
          // replace(/[^0-9.]/g, '') removes everything that isn't a digit or dot
          return isNaN(num) ? 0 : num;
          // isNaN = "is Not a Number" — fallback to 0 if parsing fails
        });

        initChart(labels, prices);  // draw the chart

        // Show the chart section (it was hidden)
        document.getElementById('chartSection').style.display = 'block';

      } catch (err) {
        console.error('Error loading history:', err);
      }
    }


    // ─────────────────────────────────────────────
    // SECURITY: Prevent XSS attacks
    //
    // XSS (Cross-Site Scripting) is when someone injects
    // HTML/JavaScript into your page via user input.
    // Example: a product named <script>alert('hacked')
    // This function converts special characters to safe versions.
    // ─────────────────────────────────────────────
    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;');
    }


    // ─────────────────────────────────────────────
    // Allow pressing ENTER key to submit
    // ─────────────────────────────────────────────
    document.getElementById('urlInput').addEventListener('keydown', function(event) {
      // addEventListener listens for events on the input
      // 'keydown' fires every time a key is pressed
      if (event.key === 'Enter') {
        trackPrice();   // same as clicking the button
      }
    });


    // ─────────────────────────────────────────────
    // LOAD HISTORY on page start
    // When the page first loads, fetch saved history from backend
    // ─────────────────────────────────────────────
    loadHistory();

  </script>

</body>
</html>
